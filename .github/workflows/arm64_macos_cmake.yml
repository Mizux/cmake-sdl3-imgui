# ref: https://github.com/actions/runner-images
name: arm64 macOS

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  native:
    strategy:
      matrix:
        cmake: [
          {name: "Xcode", generator: "Xcode", config: Release, build_target: ALL_BUILD, test_target: RUN_TESTS, install_target: install},
          {name: "Make", generator: "Unix Makefiles", config: Release, build_target: all, test_target: test, install_target: install},
        ]
      fail-fast: false
    name: arm64•MacOS•CMake(${{matrix.cmake.name}})
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Install Dependencies
        run: brew install ccache
      - name: Install SDL
        run: |
          brew update
          brew install sdl3 sdl3_image
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/checkout@v7
      - name: Check CMake
        run: cmake --version
      - name: Configure
        run: >
          cmake -S. -Bbuild
          -G "${{matrix.cmake.generator}}"
          -DCMAKE_BUILD_TYPE=${{matrix.cmake.config}}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_PREFIX_PATH="${{steps.sdl.outputs.prefix}}"
      - name: Build
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.build_target}}
          -v -j2
      - name: Test
        run: >
          CTEST_OUTPUT_ON_FAILURE=1
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.test_target}}
          -v
      - name: Install
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.install_target}}
          -v

  arm64_macos_cmake:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v7
