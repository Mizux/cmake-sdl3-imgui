# ref: https://github.com/actions/runner-images
name: amd64 Linux

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  native:
    strategy:
      matrix:
        cmake: [
          {name: "Make", generator: "Unix Makefiles", config: Release},
          {name: "Ninja", generator: "Ninja", config: Release},
          {name: "NinjaMulti", generator: "Ninja Multi-Config", config: Release},
        ]
      fail-fast: false
    name: amd64•Linux•CMake(${{matrix.cmake.name}})
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgl-dev ccache
      - name: Setup SDL3
        uses: libsdl-org/setup-sdl@main
        id: sdl
        with:
          version: 3-latest
          version-sdl-image: 3-latest
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/checkout@v7
      - name: Check CMake
        run: cmake --version
      - name: Configure
        run: >
          cmake -S. -Bbuild
          -G "${{matrix.cmake.generator}}"
          -DCMAKE_BUILD_TYPE=${{matrix.cmake.config}}
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DCMAKE_INSTALL_PREFIX=install
          -DCMAKE_PREFIX_PATH="${{steps.sdl.outputs.prefix}}"
      - name: Build
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target all
          -v -j2
      - name: Test
        run: >
          CTEST_OUTPUT_ON_FAILURE=1
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target test
          -v
      - name: Install
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target install
          -v

  amd64_linux_cmake:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v7
